<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="https://www.leerhuisinformatiehuishouding.nl/themes/rijksoverheid/header-logo.svg" />
    <title>Welkom op Leerhuis XL</title>
    <script>
      // Dynamische paginatitel op basis van route
      (function() {
        const path = window.location.pathname;
        if (path.startsWith('/admin')) {
          document.title = 'Leerhuis XL — Beheerportaal';
        } else {
          document.title = 'Welkom op Leerhuis XL';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
